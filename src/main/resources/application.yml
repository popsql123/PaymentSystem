spring:
  application:
    name: PaymentSystem

  # --- H2 / JPA (used only when app.components.persistence=jpa) ---
  datasource:
    url: jdbc:h2:mem:payone;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

  # --- Redis (used only when app.components.cache=redis) ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # --- Kafka (used only when app.components.event-bus=kafka) ---
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: payment-system
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# =====================================================================
# Component selection. Defaults below run the whole app with NO external
# infrastructure (pure in-memory). Flip any value to use the real backend:
#   persistence : memory | jpa
#   cache       : memory | redis
#   event-bus   : memory | kafka
# Override per-env, e.g.:  --app.components.cache=redis
# =====================================================================
app:
  components:
    persistence: memory
    cache: memory
    event-bus: memory

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
